plugins {
    id "architectury-plugin" version "3.4.162" apply false
    id "base"
    id "com.diffplug.spotless" version "6.25.0" apply false
    id "dev.architectury.loom" version "1.13.467" apply false
    id "fabric-loom" version "1.15.4" apply false
}

allprojects {
    group = project.findProperty("projectGroup")
    version = project.findProperty("projectVersion")
}

subprojects {
    repositories {
        mavenCentral()
        maven {
            url = "https://maven.architectury.dev/"
        }
        maven {
            url = "https://maven.fabricmc.net/"
        }
        maven {
            url = "https://libraries.minecraft.net/"
        }
        maven {
            url = "https://maven.minecraftforge.net/"
        }
        maven {
            url = "https://maven.neoforged.net/releases/"
        }
    }

    tasks.withType(AbstractArchiveTask).configureEach {
        preserveFileTimestamps = false
        reproducibleFileOrder = true
    }

    plugins.withId("java") {
        java {
            withSourcesJar()
        }

        sourceSets {
            main {
                resources {
                    srcDir(rootProject.file("shared-resources"))
                }
            }
        }

        dependencies {
            testImplementation platform("org.junit:junit-bom:5.10.3")
            testImplementation "org.junit.jupiter:junit-jupiter"
            testRuntimeOnly "org.junit.platform:junit-platform-launcher"
        }

        tasks.withType(JavaCompile).configureEach {
            options.encoding = "UTF-8"
        }

        tasks.withType(Test).configureEach {
            useJUnitPlatform()
        }
    }

    plugins.withId("com.diffplug.spotless") {
        spotless {
            java {
                target("src/*/java/**/*.java")
                googleJavaFormat("1.35.0")
            }
            format("misc") {
                target(
                    "*.gradle",
                    "*.md",
                    ".gitignore",
                    "gradle.properties",
                    "settings.gradle",
                    "src/*/resources/**/*.json"
                )
                trimTrailingWhitespace()
                endWithNewline()
            }
        }
    }
}

// main-legacy ships only the legacy 1.16.5–1.19.4 generation.
def releaseProjectsByLoader = [
    fabric: [
        ":platform-fabric-1_17_1",
        ":platform-fabric-1_18_2",
        ":platform-fabric-1_19_2",
        ":platform-fabric-1_19_4"
    ],
    forge : [
        ":platform-forge-1_17_1",
        ":platform-forge-1_18_2",
        ":platform-forge-1_19_2",
        ":platform-forge-1_19_4"
    ]
]

def releaseArtifactLabels = [
    "platform-fabric-1_17_1": "fabric-1.17.1",
    "platform-fabric-1_18_2": "fabric-1.18.2",
    "platform-fabric-1_19_2": "fabric-1.19.2",
    "platform-fabric-1_19_4": "fabric-1.19.4",
    "platform-forge-1_17_1" : "forge-1.17.1",
    "platform-forge-1_18_2" : "forge-1.18.2",
    "platform-forge-1_19_2" : "forge-1.19.2",
    "platform-forge-1_19_4" : "forge-1.19.4"
]

subprojects {
    tasks.withType(AbstractArchiveTask).configureEach {
        def releaseLabel = releaseArtifactLabels.get(project.name)
        if (releaseLabel != null) {
            archiveBaseName.set("${rootProject.findProperty('modId')}-${releaseLabel}")
        }
    }
}

def releaseBundleDir = "builtJars/${rootProject.version}"

tasks.register("buildRepresentativeTarget") {
    group = "verification"
    description = "Builds the primary fully wired Fabric target jar."
    dependsOn("${releaseProjectsByLoader.fabric.last()}:build")
}

tasks.register("buildTargetJars") {
    group = "build"
    description = "Builds and collects the current release jars into builtJars/<version>/<loader>."
    dependsOn("collectTargetJars")
}

releaseProjectsByLoader.each { loader, projectPaths ->
    tasks.register("build${loader.capitalize()}Targets") {
        group = "verification"
        description = "Builds every currently wired ${loader} target jar."
        dependsOn(projectPaths.collect { "${it}:build" })
    }

    tasks.register("collect${loader.capitalize()}Jars", Sync) {
        group = "build"
        description = "Copies the current remapped ${loader} jars into ${releaseBundleDir}/${loader}."
        into(layout.projectDirectory.dir("${releaseBundleDir}/${loader}"))
        projectPaths.each { projectPath ->
            dependsOn("${projectPath}:remapJar")
            from(project(projectPath).tasks.named("remapJar").flatMap { it.archiveFile })
        }
    }
}

tasks.register("collectTargetJars") {
    group = "build"
    description = "Copies the current remapped loader jars into builtJars/<version>/<loader>."
    dependsOn(
        "collectFabricJars",
        "collectForgeJars"
    )
}

tasks.register("buildAllJars") {
    group = "build"
    description = "Alias for buildTargetJars."
    dependsOn("buildTargetJars")
}

tasks.register("verifyWorkspace") {
    group = "verification"
    description = "Runs formatting and checks across all modules."
    dependsOn(subprojects.collect { "${it.path}:spotlessCheck" })
    dependsOn(subprojects.collect { "${it.path}:check" })
}
