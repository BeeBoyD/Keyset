subprojects {
    tasks.withType(AbstractArchiveTask).configureEach {
        def releaseLabel = releaseArtifactLabels.get(project.name)
        if (releaseLabel != null) {
            archiveBaseName.set("${rootProject.findProperty('modId')}-${releaseLabel}")
        }
    }
}

def releaseBundleDir = "builtJars/${rootProject.version}"

tasks.register("buildRepresentativeTarget") {
    group = "verification"
    description = "Builds the primary fully wired Fabric target jar."
    dependsOn("${releaseProjectsByLoader.fabric.last()}:build")
}

tasks.register("buildTargetJars") {
    group = "build"
    description = "Builds and collects the current release jars into builtJars/<version>/<loader>."
    dependsOn("collectTargetJars")
}

// platform-neoforge-26_1 uses loom-no-remap which produces 'jar', not 'remapJar'.
// platform-fabric-26_1 uses net.fabricmc.fabric-loom which still produces 'remapJar'.
def noRemapProjects = [":platform-neoforge-26_1"] as Set

releaseProjectsByLoader.each { loader, projectPaths ->
    tasks.register("build${loader.capitalize()}Targets") {
        group = "verification"
        description = "Builds every currently wired ${loader} target jar."
        dependsOn(projectPaths.collect { "${it}:build" })
    }

    tasks.register("build${loader.capitalize()}SmokeTarget") {
        group = "verification"
        description = "Builds the newest wired ${loader} target jar as a CI smoke test."
        dependsOn("${projectPaths.last()}:build")
    }

    tasks.register("collect${loader.capitalize()}Jars", Sync) {
        group = "build"
        description = "Copies the current remapped ${loader} jars into ${releaseBundleDir}/${loader}."
        into(layout.projectDirectory.dir("${releaseBundleDir}/${loader}"))
        projectPaths.each { projectPath ->
            def jarTaskName = noRemapProjects.contains(projectPath) ? "jar" : "remapJar"
            dependsOn("${projectPath}:${jarTaskName}")
            from(project(projectPath).tasks.named(jarTaskName).flatMap { it.archiveFile })
        }
    }
}

tasks.register("collectTargetJars") {
    group = "build"
    description = "Copies the current remapped loader jars into builtJars/<version>/<loader>."
    dependsOn(
        "collectFabricJars",
        "collectForgeJars",
        "collectNeoforgeJars"
    )
}

tasks.register("buildAllJars") {
    group = "build"
    description = "Alias for buildTargetJars."
    dependsOn("buildTargetJars")
}

tasks.register("buildSmokeTargets") {
    group = "verification"
    description = "Builds the newest wired target jar for each active loader."
    dependsOn(
        "buildFabricSmokeTarget",
        "buildForgeSmokeTarget",
        "buildNeoforgeSmokeTarget"
    )
}

tasks.register("verifyWorkspace") {
    group = "verification"
    description = "Runs formatting and checks across all modules."
    dependsOn(subprojects.collect { "${it.path}:spotlessCheck" })
    dependsOn(subprojects.collect { "${it.path}:check" })
}

// ---------------------------------------------------------------------------
// Publishing — mod-publish-plugin
// ---------------------------------------------------------------------------

/** Extracts the changelog section for the given version from CHANGELOG.md. */
def extractChangelog = { String ver ->
    def text = file("CHANGELOG.md").getText("UTF-8")
    def header = "## v${ver}"
    def start = text.indexOf(header)
    if (start == -1) return "See CHANGELOG.md for ${ver} release notes."
    def afterHeader = text.indexOf("\n", start) + 1
    def nextHeader = text.indexOf("\n## ", afterHeader)
    def body = nextHeader == -1 ? text.substring(afterHeader) : text.substring(afterHeader, nextHeader)
    return body.trim()
}

// Minecraft version lists per release target (used by Modrinth and CurseForge).
// Each jar claims only the MC versions it was compiled for; adjust if needed.
