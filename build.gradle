def loaderNamesForProject = [
    "fabric"  : ["fabric", "quilt"],
    "forge"   : ["forge"],
    "neoforge": ["neoforge"],
]

def releaseTargets = []
releaseProjectsByLoader.each { loader, projectPaths ->
    projectPaths.each { projectPath ->
        releaseTargets << [loader: loader, projectName: projectPath.substring(1)]
    }
}

def primaryGithubReleaseProject = [
    loader     : "fabric",
    projectName: releaseProjectsByLoader.fabric.last().substring(1)
]

def releaseJarFile = { String loader, String projectName ->
    def label = releaseArtifactLabels[projectName]
    if (label == null) {
        throw new GradleException("Missing release artifact label for ${projectName}")
    }
    return layout.projectDirectory.file("${releaseBundleDir}/${loader}/${rootProject.findProperty('modId')}-${label}-${rootProject.version}.jar")
}

publishMods {
    def ext = delegate

    ext.changelog = extractChangelog(version as String)
    // STABLE/BETA/ALPHA are enum constants exposed by the extension delegate — evaluate here.
    def releaseTypeProp = findProperty("releaseType")?.toString()?.toUpperCase()
    def publishDryRun = findProperty("publishDryRun")?.toString()?.toBoolean() ?: false
    ext.type = (releaseTypeProp == "BETA" ? BETA : (releaseTypeProp == "ALPHA" ? ALPHA : STABLE))
    ext.maxRetries = 5
    ext.dryRun = publishDryRun

    def modrinthToken = providers.environmentVariable("MODRINTH_TOKEN").orNull
        ?: localSecrets.getProperty("modrinthToken")
    def modrinthProjectId = findProperty("modrinthProjectId")?.toString()
    def githubRepo = findProperty("githubRepo")?.toString()
    def githubToken = providers.environmentVariable("GITHUB_TOKEN").orNull
        ?: providers.environmentVariable("GH_TOKEN").orNull

    if (githubToken == null) {
        try {
            def stdout = new ByteArrayOutputStream()
            exec {
                commandLine("gh", "auth", "token")
                standardOutput = stdout
                errorOutput = new ByteArrayOutputStream()
                ignoreExitValue = true
            }
            def ghToken = stdout.toString("UTF-8").trim()
            githubToken = ghToken ? ghToken : null
        } catch (Exception ignored) {
            githubToken = null
        }
    }

    def mrOptions = (modrinthToken != null && modrinthProjectId != null) ? ext.modrinthOptions {
        accessToken = modrinthToken
        projectId = modrinthProjectId
    } : null

    // Create one Modrinth entry per release jar.
    releaseTargets.each { target ->
        def safeName = target.projectName.replace("-", "_")
        def mcVersions = mcVersionsForProject[target.projectName]
        def loaders = loaderNamesForProject[target.loader]
        def builtJar = releaseJarFile(target.loader, target.projectName)

        if (mrOptions != null) {
            ext.modrinth("mr_${safeName}") {
                from mrOptions
                file = builtJar
                modLoaders.addAll(loaders)
                if (mcVersions) minecraftVersions.addAll(mcVersions)
                if (target.loader == "fabric") {
                    requires {
                        slug = "fabric-api"
                    }
                }
            }
        }
    }

    if (githubToken != null && githubRepo != null) {
        def primaryJar = releaseJarFile(primaryGithubReleaseProject.loader, primaryGithubReleaseProject.projectName)
        def extraReleaseJars = releaseTargets
            .findAll { it.projectName != primaryGithubReleaseProject.projectName || it.loader != primaryGithubReleaseProject.loader }
            .collect { releaseJarFile(it.loader, it.projectName) }

        // GitHub release — attach every collected jar and use the newest Fabric target as the primary asset.
        ext.github {
            accessToken = githubToken
            repository = githubRepo
            commitish = "main"
            tagName = "v${version}"
            file = primaryJar
            additionalFiles.from(extraReleaseJars)
        }
    }
}

tasks.named("publishMods").configure {
    dependsOn("buildTargetJars")
}
