plugins {
    id "architectury-plugin" version "3.4.162" apply false
    id "base"
    id "com.diffplug.spotless" version "6.25.0" apply false
    id "dev.architectury.loom" version "1.13.467" apply false
    id "dev.architectury.loom-no-remap" version "1.14.473" apply false
    id "fabric-loom" version "1.15.4" apply false
    id "me.modmuss50.mod-publish-plugin" version "1.1.0"
    id "net.fabricmc.fabric-loom" version "1.15-SNAPSHOT" apply false
}

def localSecrets = new Properties()
def localSecretsFile = rootProject.file("gradle-local.properties")
if (localSecretsFile.exists()) {
    localSecretsFile.withInputStream { stream ->
        localSecrets.load(stream)
    }
}

allprojects {
    group = project.findProperty("projectGroup")
    version = project.findProperty("projectVersion")
}

subprojects {
    repositories {
        mavenCentral()
        maven {
            url = "https://maven.architectury.dev/"
        }
        maven {
            url = "https://maven.fabricmc.net/"
        }
        maven {
            url = "https://libraries.minecraft.net/"
        }
        maven {
            url = "https://maven.minecraftforge.net/"
        }
        maven {
            url = "https://maven.neoforged.net/releases/"
        }
    }

    tasks.withType(AbstractArchiveTask).configureEach {
        preserveFileTimestamps = false
        reproducibleFileOrder = true
    }

    plugins.withId("java") {
        java {
            withSourcesJar()
        }

        sourceSets {
            main {
                resources {
                    srcDir(rootProject.file("shared-resources"))
                }
            }
        }

        dependencies {
            testImplementation platform("org.junit:junit-bom:5.10.3")
            testImplementation "org.junit.jupiter:junit-jupiter"
            testRuntimeOnly "org.junit.platform:junit-platform-launcher"
        }

        tasks.withType(JavaCompile).configureEach {
            options.encoding = "UTF-8"
        }

        tasks.withType(Test).configureEach {
            useJUnitPlatform()
        }
    }

    plugins.withId("com.diffplug.spotless") {
        spotless {
            java {
                target("src/*/java/**/*.java")
                googleJavaFormat("1.35.0")
            }
            format("misc") {
                target(
                    "*.gradle",
                    "*.md",
                    ".gitignore",
                    "gradle.properties",
                    "settings.gradle",
                    "src/*/resources/**/*.json"
                )
                trimTrailingWhitespace()
                endWithNewline()
            }
        }
    }
}
