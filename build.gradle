// When -PbuildTargets=label1,label2 is passed, only those release targets are
// built, collected, verified, and published. Pass "all" or omit to include everything.
def resolveActiveTargets = { ->
    def prop = findProperty("buildTargets")?.toString()?.trim()
    if (prop == null || prop.isEmpty() || prop == "all") return releaseTargets

    def labels = prop.split(",")*.trim()
    def emptyLabels = labels.findAll { it.isEmpty() }
    if (!emptyLabels.isEmpty()) {
        throw new GradleException(
            "Invalid -PbuildTargets='${prop}': empty target labels are not allowed. " +
                "Valid labels: ${releaseTargets.collect { it.label }.join(', ')}"
        )
    }

    def unknownLabels = labels.findAll { !releaseTargetLabels.contains(it) }.unique()
    if (!unknownLabels.isEmpty()) {
        throw new GradleException(
            "Unknown build target label(s) in -PbuildTargets='${prop}': " +
                "${unknownLabels.join(', ')}. Valid labels: ${releaseTargets.collect { it.label }.join(', ')}"
        )
    }

    def active = releaseTargets.findAll { labels.contains(it.label) }
    if (active.isEmpty()) {
        throw new GradleException(
            "No release targets matched -PbuildTargets='${prop}'. " +
                "Known labels: ${releaseTargets.collect { it.label }.join(', ')}"
        )
    }
    return active
}
def activeReleaseTargets = resolveActiveTargets()

