        [path: ":platform-fabric-1_20_4", label: "fabric-1.20.4", minecraftVersions: ["1.20.3", "1.20.4"]],
        [path: ":platform-fabric-1_20_6", label: "fabric-1.20.3-1.20.6", minecraftVersions: ["1.20.5", "1.20.6"]],
        [path: ":platform-fabric-1_21_1", label: "fabric-1.21.1", minecraftVersions: ["1.21", "1.21.1"]],
        [path: ":platform-fabric-1_21_4", label: "fabric-1.21.4", minecraftVersions: ["1.21.2", "1.21.3", "1.21.4"]],
        [path: ":platform-fabric-1_21_9", label: "fabric-1.21.9", minecraftVersions: ["1.21.5", "1.21.6", "1.21.7", "1.21.8", "1.21.9"]],
        [path: ":platform-fabric-1_21_11", label: "fabric-1.21-1.21.11", minecraftVersions: ["1.21.10", "1.21.11"]],
