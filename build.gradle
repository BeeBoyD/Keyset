subprojects {
    tasks.withType(AbstractArchiveTask).configureEach {
        def releaseLabel = releaseArtifactLabels.get(project.name)
        if (releaseLabel != null) {
            archiveBaseName.set("${rootProject.findProperty('modId')}-${releaseLabel}")
        }
    }
}

tasks.register("buildRepresentativeTarget") {
    group = "verification"
    description = "Builds the primary fully wired Fabric target jar."
    dependsOn(":platform-fabric-1_21_11:build")
}

tasks.register("buildFabricTargets") {
    group = "verification"
    description = "Builds every currently wired Fabric target jar."
    dependsOn(
        ":platform-fabric-1_16_5:build",
        ":platform-fabric-1_17_1:build",
        ":platform-fabric-1_18_2:build",
        ":platform-fabric-1_19_2:build",
        ":platform-fabric-1_19_4:build",
        ":platform-fabric-1_20_1:build",
        ":platform-fabric-1_20_4:build",
        ":platform-fabric-1_20_6:build",
        ":platform-fabric-1_21_1:build",
        ":platform-fabric-1_21_4:build",
        ":platform-fabric-1_21_9:build",
        ":platform-fabric-1_21_11:build"
    )
}

tasks.register("buildTargetJars") {
    group = "build"
    description = "Builds and collects the current release jars into builtJars/<loader>/<version>."
    dependsOn("collectTargetJars")
}

releaseProjectsByLoader.each { loader, projectPaths ->
    tasks.register("collect${loader.capitalize()}Jars", Sync) {
        group = "build"
        description = "Copies the current remapped ${loader} jars into builtJars/${loader}/${rootProject.version}."
        dependsOn(projectPaths.collect { "${it}:remapJar" })
        into(layout.projectDirectory.dir("builtJars/${loader}"))
        into(rootProject.version.toString()) {
            from(projectPaths.collect { projectPath ->
                project(projectPath).tasks.named("remapJar").flatMap { it.archiveFile }
            })
        }
    }
}

tasks.register("collectTargetJars") {
    group = "build"
    description = "Copies the current remapped loader jars into builtJars/<loader>/<version>."
    dependsOn(
        "collectFabricJars",
        "collectForgeJars",
        "collectNeoforgeJars"
    )
}

tasks.register("buildAllJars") {
    group = "build"
    description = "Alias for buildTargetJars."
    dependsOn("buildTargetJars")
}

tasks.register("buildForgeTargets") {
    group = "verification"
    description = "Builds every currently wired Forge target jar."
    dependsOn(
        ":platform-forge-1_16_5:build",
        ":platform-forge-1_17_1:build",
        ":platform-forge-1_18_2:build",
        ":platform-forge-1_19_2:build",
        ":platform-forge-1_19_4:build",
        ":platform-forge-1_20_1:build",
        ":platform-forge-1_20_4:build",
        ":platform-forge-1_20_6:build",
        ":platform-forge-1_21_1:build"
    )
}

tasks.register("buildNeoForgeTargets") {
    group = "verification"
    description = "Builds every currently wired NeoForge target jar."
    dependsOn(
        ":platform-neoforge-1_20_1:build",
        ":platform-neoforge-1_20_4:build",
        ":platform-neoforge-1_20_6:build",
        ":platform-neoforge-1_21_1:build",
        ":platform-neoforge-1_21_4:build",
        ":platform-neoforge-1_21_11:build"
    )
}

tasks.register("verifyWorkspace") {
    group = "verification"
    description = "Runs formatting and checks across all modules."
    dependsOn(subprojects.collect { "${it.path}:spotlessCheck" })
    dependsOn(subprojects.collect { "${it.path}:check" })
}
