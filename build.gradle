plugins {
    id "base"
    id "com.diffplug.spotless" version "6.25.0" apply false
    id "dev.architectury.loom-no-remap" version "1.14.473" apply false
    id "net.fabricmc.fabric-loom" version "1.15-SNAPSHOT" apply false
}

allprojects {
    group = project.findProperty("projectGroup")
    version = project.findProperty("projectVersion")
}

subprojects {
    repositories {
        mavenCentral()
        maven {
            url = "https://maven.architectury.dev/"
        }
        maven {
            url = "https://maven.fabricmc.net/"
        }
        maven {
            url = "https://libraries.minecraft.net/"
        }
        maven {
            url = "https://maven.minecraftforge.net/"
        }
        maven {
            url = "https://maven.neoforged.net/releases/"
        }
    }

    tasks.withType(AbstractArchiveTask).configureEach {
        preserveFileTimestamps = false
        reproducibleFileOrder = true
    }

    plugins.withId("java") {
        java {
            withSourcesJar()
        }

        sourceSets {
            main {
                resources {
                    srcDir(rootProject.file("shared-resources"))
                }
            }
        }

        dependencies {
            testImplementation platform("org.junit:junit-bom:5.10.3")
            testImplementation "org.junit.jupiter:junit-jupiter"
            testRuntimeOnly "org.junit.platform:junit-platform-launcher"
        }

        tasks.withType(JavaCompile).configureEach {
            options.encoding = "UTF-8"
        }

        tasks.withType(Test).configureEach {
            useJUnitPlatform()
        }
    }

    plugins.withId("com.diffplug.spotless") {
        spotless {
            java {
                target("src/*/java/**/*.java")
                googleJavaFormat("1.35.0")
            }
            format("misc") {
                target(
                    "*.gradle",
                    "*.md",
                    ".gitignore",
                    "gradle.properties",
                    "settings.gradle",
                    "src/*/resources/**/*.json"
                )
                trimTrailingWhitespace()
                endWithNewline()
            }
        }
    }
}

// main-next ships only the 26.1 generation.
def releaseProjectsByLoader = [
    fabric  : [
        ":platform-fabric-26_1"
    ],
    neoforge: [
        ":platform-neoforge-26_1"
    ]
]

def releaseArtifactLabels = [
    "platform-fabric-26_1"  : "fabric-26.1",
    "platform-neoforge-26_1": "neoforge-26.1"
]

subprojects {
    tasks.withType(AbstractArchiveTask).configureEach {
        def releaseLabel = releaseArtifactLabels.get(project.name)
        if (releaseLabel != null) {
            archiveBaseName.set("${rootProject.findProperty('modId')}-${releaseLabel}")
        }
    }
}

def releaseBundleDir = "builtJars/${rootProject.version}"

// platform-fabric-26_1 and platform-neoforge-26_1 use loom-no-remap which produces 'jar', not 'remapJar'.
def noRemapProjects = [":platform-fabric-26_1", ":platform-neoforge-26_1"] as Set

tasks.register("buildRepresentativeTarget") {
    group = "verification"
    description = "Builds the primary fully wired Fabric target jar."
    dependsOn(":platform-fabric-26_1:build")
}

tasks.register("buildTargetJars") {
    group = "build"
    description = "Builds and collects the current release jars into builtJars/<version>/<loader>."
    dependsOn("collectTargetJars")
}

releaseProjectsByLoader.each { loader, projectPaths ->
    tasks.register("build${loader.capitalize()}Targets") {
        group = "verification"
        description = "Builds every currently wired ${loader} target jar."
        dependsOn(projectPaths.collect { "${it}:build" })
    }

    tasks.register("collect${loader.capitalize()}Jars", Sync) {
        group = "build"
        description = "Copies the current ${loader} jars into ${releaseBundleDir}/${loader}."
        into(layout.projectDirectory.dir("${releaseBundleDir}/${loader}"))
        projectPaths.each { projectPath ->
            def jarTaskName = noRemapProjects.contains(projectPath) ? "jar" : "remapJar"
            dependsOn("${projectPath}:${jarTaskName}")
            from(project(projectPath).tasks.named(jarTaskName).flatMap { it.archiveFile })
        }
    }
}

tasks.register("collectTargetJars") {
    group = "build"
    description = "Copies the current loader jars into builtJars/<version>/<loader>."
    dependsOn(
        "collectFabricJars",
        "collectNeoforgeJars"
    )
}

tasks.register("buildAllJars") {
    group = "build"
    description = "Alias for buildTargetJars."
    dependsOn("buildTargetJars")
}

tasks.register("verifyWorkspace") {
    group = "verification"
    description = "Runs formatting and checks across all modules."
    dependsOn(subprojects.collect { "${it.path}:spotlessCheck" })
    dependsOn(subprojects.collect { "${it.path}:check" })
}
