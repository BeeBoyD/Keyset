def releaseJarFile = { Map target ->
    def label = target.label ?: releaseArtifactLabels[target.projectName]
    if (label == null) {
        throw new GradleException("Missing release artifact label for ${target.projectName}")
    }
    return layout.projectDirectory.file("${releaseBundleDir}/${target.loader}/${rootProject.findProperty('modId')}-${label}-${rootProject.version}.jar")
}

def parseReleaseType = { ->
    def rawReleaseType = findProperty("releaseType")?.toString()?.trim()
    def releaseType = rawReleaseType == null || rawReleaseType.isEmpty() ? "stable" : rawReleaseType.toLowerCase()
    if (!allowedReleaseTypes.contains(releaseType)) {
        throw new GradleException(
            "Invalid releaseType '${rawReleaseType}'. Expected one of: ${allowedReleaseTypes.join(', ')}."
        )
    }
    return releaseType
}

def jarHasEntry = { java.util.zip.ZipFile zipFile, String entryName ->
    return zipFile.getEntry(entryName) != null
}

def jarContainsClassFile = { java.util.zip.ZipFile zipFile ->
    def entries = zipFile.entries()
    while (entries.hasMoreElements()) {
        def entry = entries.nextElement()
        if (!entry.isDirectory() && entry.name.endsWith(".class")) {
            return true
        }
    }
    return false
}

def expectedMetadataEntryForLoader = [
    fabric  : "fabric.mod.json",
    forge   : "META-INF/mods.toml",
    neoforge: "META-INF/neoforge.mods.toml"
]

def validateReleaseJar = { File jarFile, String metadataEntry, String label ->
    if (!jarFile.exists()) {
        throw new GradleException("Release jar not found: ${jarFile.path}")
    }
    if (jarFile.length() <= 0L) {
        throw new GradleException("Release jar is empty: ${jarFile.path}")
    }

    try {
        new java.util.zip.ZipFile(jarFile).withCloseable { zipFile ->
            if (!jarHasEntry(zipFile, metadataEntry)) {
                throw new GradleException(
                    "Release jar ${jarFile.name} is missing required metadata entry '${metadataEntry}'."
                )
            }
            if (!jarContainsClassFile(zipFile)) {
                throw new GradleException("Release jar ${jarFile.name} does not contain any class files.")
            }
        }
    } catch (java.io.IOException exception) {
        throw new GradleException("Release jar is not a valid ZIP archive: ${jarFile.path}", exception)
    }
}

tasks.register("cleanReleaseBundle", Delete) {
    group = "build"
    description = "Deletes the current builtJars/<version> bundle before rebuilding it."
    delete(layout.projectDirectory.dir(releaseBundleDir))
}

tasks.register("stageReleaseMetadata") {
    group = "build"
    description = "Writes release metadata files into builtJars/<version>."

    def githubChangelog = layout.projectDirectory.file("${releaseBundleDir}/GITHUB_CHANGELOG.md")
    def modrinthChangelog = layout.projectDirectory.file("${releaseBundleDir}/MODRINTH_CHANGELOG.md")
    def buildInfo = layout.projectDirectory.file("${releaseBundleDir}/BUILD_INFO.md")

    outputs.files(githubChangelog, modrinthChangelog, buildInfo)
    mustRunAfter("cleanReleaseBundle")

    doLast {
        def releaseDir = githubChangelog.asFile.parentFile
        releaseDir.mkdirs()

        def changelogBody = extractChangelog(version as String) + "\n"
        githubChangelog.asFile.text = changelogBody
        modrinthChangelog.asFile.text = changelogBody

        def lines = [
            "# Keyset ${version} Build Bundle",
            "",
            "Generated by `./gradlew buildTargetJars`.",
            "",
            "## Included Targets"
        ]
        activeReleaseTargets.each { target ->
            lines << "- `${rootProject.findProperty('modId')}-${target.label}-${version}.jar`"
        }
        buildInfo.asFile.text = lines.join("\n") + "\n"
    }
}

tasks.register("verifyReleaseBundle") {
    group = "verification"
    description = "Verifies that buildTargetJars produced the expected builtJars bundle."
    dependsOn("buildTargetJars")

    doLast {
        def missing = []

        activeReleaseTargets.each { target ->
            def jarFile = releaseJarFile(target).asFile
            def metadataEntry = target.metadataEntry ?: expectedMetadataEntryForLoader[target.loader]
            try {
                validateReleaseJar(jarFile, metadataEntry, target.label)
            } catch (GradleException exception) {
                missing << exception.message
            }
        }

        def githubChangelog = layout.projectDirectory.file("${releaseBundleDir}/GITHUB_CHANGELOG.md").asFile
        def modrinthChangelog = layout.projectDirectory.file("${releaseBundleDir}/MODRINTH_CHANGELOG.md").asFile
        def buildInfo = layout.projectDirectory.file("${releaseBundleDir}/BUILD_INFO.md").asFile
        [githubChangelog, modrinthChangelog, buildInfo].each { metadataFile ->
            if (!metadataFile.exists()) {
                missing << metadataFile.path
            } else if (metadataFile.length() <= 0L) {
                missing << "${metadataFile.path} (empty)"
            }
        }

        def buildInfoText = buildInfo.exists() ? buildInfo.getText("UTF-8") : ""
        if (buildInfoText) {
            activeReleaseTargets.each { target ->
                def expectedName = "${rootProject.findProperty('modId')}-${target.label}-${version}.jar"
                if (!buildInfoText.contains(expectedName)) {
                    missing << "${buildInfo.path} missing reference to ${expectedName}"
                }
            }
        }

        if (!missing.isEmpty()) {
            throw new GradleException("Release bundle is incomplete. Missing:\n - " + missing.join("\n - "))
        }
    }
}

tasks.named("collectTargetJars") {
    mustRunAfter("cleanReleaseBundle")
}

