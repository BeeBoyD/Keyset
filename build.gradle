tasks.register("publishToModrinth") {
    group = "publishing"
    description = "Uploads built jars to Modrinth via the REST API."
    dependsOn("validateReleaseType")
    dependsOn("buildSelectedTargets")
    outputs.upToDateWhen { false }
    doNotTrackState("Network publish — must always run")

    doLast {
        def token = System.getenv("MODRINTH_TOKEN") ?: localSecrets.getProperty("modrinthToken")
        if (!token) {
            throw new GradleException(
                "MODRINTH_TOKEN is not set. " +
                "Add it as a repository secret (CI) or in gradle-local.properties (local)."
            )
        }

        def projectId     = findProperty("modrinthProjectId")?.toString()
        if (!projectId) {
            throw new GradleException("modrinthProjectId is not set.")
        }
        def versionStr    = version as String
        def releaseType   = parseReleaseType()
        def versionType   = (releaseType == "stable") ? "release" : releaseType
        def dryRun        = findProperty("publishDryRun")?.toString()?.toBoolean() ?: false
        def changelog     = extractChangelog(versionStr)
        def CRLF          = "\r\n"
        def buildNumber = null
        if (releaseType == "beta") {
            buildNumber = System.getenv("GITHUB_RUN_NUMBER")?.trim()
            if (!buildNumber) {
                def gitRunNumber = new ByteArrayOutputStream()
                exec {
                    commandLine("git", "rev-list", "--count", "HEAD")
                    standardOutput = gitRunNumber
                    errorOutput = new ByteArrayOutputStream()
                    ignoreExitValue = true
                }
                buildNumber = gitRunNumber.toString("UTF-8").trim()
            }
            if (!buildNumber) {
                throw new GradleException("Unable to resolve a beta build number for Modrinth publishing.")
            }
        }

        def compactTargetToken = { Map target ->
            def loaderCode = (target.loader == "fabric") ? "f" : ((target.loader == "forge") ? "g" : "n")
            def firstMc = target.minecraftVersions.first().toString().replace(".", "")
            def lastMc = target.minecraftVersions.last().toString().replace(".", "")
            def mcCode = (firstMc == lastMc) ? firstMc : "${firstMc}-${lastMc}"
            return "${loaderCode}${mcCode}"
        }

        def modrinthVersions = null
        if (!dryRun) {
            def url = new URL("https://api.modrinth.com/v2/project/${projectId}/version")
            def conn = (HttpURLConnection) url.openConnection()
            conn.requestMethod = "GET"
            conn.connectTimeout = 30_000
            conn.readTimeout = 30_000
            conn.setRequestProperty("Authorization", token)
            conn.setRequestProperty("User-Agent", "BeeBoyD/Keyset/${versionStr} (gradle-direct)")

            def code = conn.responseCode
            def response = (code < 300 ? conn.inputStream : conn.errorStream)?.getText("UTF-8") ?: ""
            if (code in 200..299) {
                modrinthVersions = new groovy.json.JsonSlurper().parseText(response)
            } else {
                throw new GradleException("Modrinth version lookup failed for project ${projectId} (HTTP ${code}):\n${response}")
            }
        }

        activeReleaseTargets.each { target ->
            def jarFile = releaseJarFile(target).asFile
            if (!jarFile.exists()) {
                throw new GradleException("Jar not found: ${jarFile}. Run buildSelectedTargets first.")
            }

            def loaders = loaderNamesForProject[target.loader]
            def deps    = (target.loader == "fabric")
                ? [[project_id: "P7dR8mSH", dependency_type: "required"]]   // Fabric API
                : []
            def targetToken = compactTargetToken(target)
            def versionNumber = (releaseType == "beta")
                ? "${versionStr}-b${buildNumber}-${targetToken}"
                : "${versionStr}+${target.label}"
            if (versionNumber.length() > 32) {
                throw new GradleException(
                    "Generated Modrinth version_number exceeds 32 chars: '${versionNumber}' for target ${target.label}"
                )
            }

            def meta = [
                name          : (releaseType == "beta")
                    ? "${versionStr}+${target.label}-${buildNumber}"
                    : "${versionStr}+${target.label}",
                version_number: versionNumber,
                changelog     : changelog,
                dependencies  : deps,
                game_versions : target.minecraftVersions,
                version_type  : versionType,
                loaders       : loaders,
                featured      : false,
                project_id    : projectId,
                file_parts    : ["file"]
            ]

            if (dryRun) {
                logger.lifecycle("[DRY RUN] ${jarFile.name} → Modrinth ${meta.version_number} (${versionType}, loaders=${loaders}, mc=${target.minecraftVersions})")
                return
            }

            def alreadyPublished = (modrinthVersions ?: []).any { version ->
                version?.version_number?.toString() == versionNumber
            }
            if (alreadyPublished) {
                logger.lifecycle("Modrinth: skipping ${jarFile.name}; version ${versionNumber} already exists")
                return
            }

            def boundary = "KeysetBoundary${UUID.randomUUID().toString().replace('-', '')}"
            def metaJson = groovy.json.JsonOutput.toJson(meta)
            def body     = new ByteArrayOutputStream()
            def w        = { String s -> body.write(s.getBytes("UTF-8")) }

            w("--${boundary}${CRLF}")
            w("Content-Disposition: form-data; name=\"data\"${CRLF}")
            w("Content-Type: application/json${CRLF}${CRLF}")
            w(metaJson)
            w("${CRLF}--${boundary}${CRLF}")
            w("Content-Disposition: form-data; name=\"file\"; filename=\"${jarFile.name}\"${CRLF}")
            w("Content-Type: application/java-archive${CRLF}${CRLF}")
            body.write(jarFile.bytes)
            w("${CRLF}--${boundary}--${CRLF}")

            def url  = new URL("https://api.modrinth.com/v2/version")
            def conn = (HttpURLConnection) url.openConnection()
            conn.requestMethod = "POST"
            conn.doOutput      = true
            conn.connectTimeout = 30_000
            conn.readTimeout    = 60_000
            conn.setRequestProperty("Authorization", token)
            conn.setRequestProperty("Content-Type", "multipart/form-data; boundary=${boundary}")
            conn.setRequestProperty("User-Agent", "BeeBoyD/Keyset/${versionStr} (gradle-direct)")

            def bodyBytes = body.toByteArray()
            conn.setRequestProperty("Content-Length", String.valueOf(bodyBytes.length))
            conn.outputStream.write(bodyBytes)
            conn.outputStream.close()

            def code     = conn.responseCode
            def response = (code < 300 ? conn.inputStream : conn.errorStream)?.getText("UTF-8") ?: ""
            if (code in 200..299) {
                logger.lifecycle("Modrinth: published ${jarFile.name} (HTTP ${code})")
            } else {
                throw new GradleException("Modrinth upload failed for ${jarFile.name} (HTTP ${code}):\n${response}")
            }
        }
    }
}

// ---------------------------------------------------------------------------
// GitHub release publishing — gh CLI
// ---------------------------------------------------------------------------

tasks.register("publishToGitHub") {
    group = "publishing"
    description = "Creates or updates a GitHub release and attaches all built jars."
    dependsOn("validateReleaseType")
    dependsOn("buildSelectedTargets")
    outputs.upToDateWhen { false }
    doNotTrackState("Network publish — must always run")

    doLast {
        def skipGitHub = findProperty("noGitHub")?.toString()?.toBoolean() ?: false
        if (skipGitHub) { logger.lifecycle("GitHub publish skipped (-PnoGitHub=true)"); return }

        def githubRepo = findProperty("githubRepo")?.toString()
        if (!githubRepo) { logger.warn("githubRepo not set — skipping GitHub release"); return }

        def versionStr = version as String
        def tagName    = "v${versionStr}"
        def releaseType = parseReleaseType()
        def dryRun     = findProperty("publishDryRun")?.toString()?.toBoolean() ?: false
        def changelogFile = layout.projectDirectory.file("${releaseBundleDir}/GITHUB_CHANGELOG.md").asFile
        def changelogText = changelogFile.exists() ? changelogFile.text : extractChangelog(versionStr)

        def jarFiles = activeReleaseTargets.collect { releaseJarFile(it).asFile }.findAll { it.exists() }

        if (dryRun) {
            logger.lifecycle("[DRY RUN] Would create GitHub release ${tagName} with ${jarFiles.size()} jar(s)")
            return
        }

        def ghToken = System.getenv("GITHUB_TOKEN") ?: System.getenv("GH_TOKEN") ?: ""
        def runGh = { List<String> command ->
            def output = providers.exec {
                commandLine(command)
                environment("GH_TOKEN", ghToken)
                ignoreExitValue = true
            }
            def result = output.result.get()
            return [
                exitValue: result.exitValue,
                stdout   : output.standardOutput.asText.get(),
                stderr   : output.standardError.asText.get()
            ]
        }

        def releaseExists = false
        def viewResult = runGh(["gh", "release", "view", tagName, "--repo", githubRepo])
        releaseExists = (viewResult.exitValue == 0)

        if (!releaseExists) {
            def cmd = ["gh", "release", "create", tagName,
                       "--repo", githubRepo,
                       "--title", "Keyset ${versionStr}",
                       "--notes", changelogText]
            if (releaseType != "stable") cmd += ["--prerelease"]
            cmd += jarFiles.collect { it.absolutePath }
            def createResult = runGh(cmd)
            if (createResult.exitValue != 0) {
                throw new GradleException(
                    "GitHub release creation failed for ${tagName} (exit ${createResult.exitValue}):\n" +
                        "${createResult.stderr ?: createResult.stdout}"
                )
            }
            logger.lifecycle("GitHub: created release ${tagName} with ${jarFiles.size()} jar(s)")
        } else {
            def uploadCmd = ["gh", "release", "upload", tagName, "--repo", githubRepo, "--clobber"]
            uploadCmd += jarFiles.collect { it.absolutePath }
            def uploadResult = runGh(uploadCmd)
            if (uploadResult.exitValue != 0) {
                throw new GradleException(
                    "GitHub release upload failed for ${tagName} (exit ${uploadResult.exitValue}):\n" +
                        "${uploadResult.stderr ?: uploadResult.stdout}"
                )
            }
            logger.lifecycle("GitHub: uploaded ${jarFiles.size()} jar(s) to existing release ${tagName}")
        }
    }
}

// Convenience aggregate matching old publishMods name used in release.yml
tasks.register("publishMods") {
    group = "publishing"
    description = "Publishes to Modrinth and optionally GitHub."
    dependsOn("publishToModrinth")
    def skipGitHub = findProperty("noGitHub")?.toString()?.toBoolean() ?: false
    if (!skipGitHub) dependsOn("publishToGitHub")
}

tasks.register("validateReleaseType") {
    group = "verification"
    description = "Validates -PreleaseType against the supported publishing modes."

    doLast {
        parseReleaseType()
    }
}
