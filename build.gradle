/** Extracts the changelog section for the given version from CHANGELOG.md. */
def extractChangelog = { String ver ->
    def text = file("CHANGELOG.md").getText("UTF-8")
    def header = "## v${ver}"
    def start = text.indexOf(header)
    if (start == -1) {
        throw new GradleException("CHANGELOG.md does not contain a section header for v${ver}.")
    }
    def afterHeader = text.indexOf("\n", start) + 1
    def nextHeader = text.indexOf("\n## ", afterHeader)
    def body = nextHeader == -1 ? text.substring(afterHeader) : text.substring(afterHeader, nextHeader)
    return body.trim()
}

