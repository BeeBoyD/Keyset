plugins {
    id "architectury-plugin"
    id "dev.architectury.loom"
    id "com.diffplug.spotless"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

base {
    archivesName = "keyset-forge-1.19.4"
}

loom {
    silentMojangMappingsLicense()
    mods {
        main {
            sourceSet sourceSets.main
        }
    }
}

architectury {
    platformSetupLoomIde()
    forge()
}

sourceSets {
    main {
        java {
            srcDir(project(":core").file("src/main/java"))
            srcDir(project(":common-v1_19_x").file("src/main/java"))
            srcDir(project(":platform-fabric-1_19_4").file("src/main/java"))
            exclude("net/beeboyd/keyset/platform/fabric/KeysetFabricClient.java")
        }
        resources {
            srcDir(project(":platform-fabric-1_19_4").file("src/main/resources"))
            exclude("fabric.mod.json")
        }
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.property('minecraftVersion_1_19_4')}"
    mappings "net.fabricmc:yarn:${project.property('yarnMappings_1_19_4')}:v2"
    forge "net.minecraftforge:forge:${project.property('forgeVersion_1_19_4')}"
}

tasks.withType(JavaCompile).configureEach {
    options.release = 17
}

tasks.withType(JavaExec).configureEach {
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

processResources {
    def expandProps = [
        modId: project.property("modId"),
        modName: project.property("modName"),
        modVersion: project.version,
        modDescription: project.property("modDescription"),
        minecraftVersion: project.property("supportedMinecraftRange_1_19_4"),
        loaderVersion: "[45,)"
    ]
    inputs.properties(expandProps)
    filesMatching("META-INF/mods.toml") {
        expand(expandProps)
    }
}

jar {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}
