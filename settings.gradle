pluginManagement {
    repositories {
        gradlePluginPortal()
        mavenCentral()
        maven {
            url = "https://maven.fabricmc.net/"
        }
        maven {
            url = "https://maven.minecraftforge.net/"
        }
        maven {
            url = "https://maven.neoforged.net/releases/"
        }
    }
}

plugins {
    id "org.gradle.toolchains.foojay-resolver-convention" version "1.0.0"
}

dependencyResolutionManagement {
    repositoriesMode = RepositoriesMode.PREFER_PROJECT
    repositories {
        mavenCentral()
        maven {
            url = "https://maven.fabricmc.net/"
        }
        maven {
            url = "https://libraries.minecraft.net/"
        }
        maven {
            url = "https://maven.minecraftforge.net/"
        }
        maven {
            url = "https://maven.neoforged.net/releases/"
        }
    }
}

rootProject.name = "Keyset"

include("core")
include("common-v1_16_5-to-v1_18_x")
include("common-v1_19_x")
include("common-v1_20_1-to-v1_20_2")
include("common-v1_20_3-to-v1_20_6")
include("common-v1_21-to-v1_21_11")
include("platform-fabric-1_16_5")
include("platform-fabric-1_17_1")
include("platform-fabric-1_18_2")
include("platform-fabric-1_19_2")
include("platform-fabric-1_19_4")
include("platform-fabric-1_20_1")
include("platform-fabric-1_20_4")
include("platform-fabric-1_20_6")
include("platform-fabric-1_21_1")
include("platform-fabric-1_21_4")
include("platform-fabric-1_21_9")
