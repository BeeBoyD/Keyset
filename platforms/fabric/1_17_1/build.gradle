plugins {
    id "fabric-loom"
    id "com.diffplug.spotless"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

base {
    archivesName = "keyset-fabric-1.17.1"
}

sourceSets {
    main {
        java {
            srcDir(project(":core").file("src/main/java"))
            srcDir(project(":common-v1_16_5-to-v1_18_x").file("src/main/java"))
        }
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.property('minecraftVersion_1_17_1')}"
    mappings "net.fabricmc:yarn:${project.property('yarnMappings_1_17_1')}:v2"
    modImplementation "net.fabricmc:fabric-loader:${project.property('fabricLoaderVersion_1_17_1')}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.property('fabricApiVersion_1_17_1')}"

    implementation project(":common-v1_16_5-to-v1_18_x")
}

tasks.withType(JavaCompile).configureEach {
    options.release = 16
}

tasks.withType(JavaExec).configureEach {
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

processResources {
    inputs.property("modVersion", project.version)
    filesMatching("fabric.mod.json") {
        expand(
            modId: project.property("modId"),
            modName: project.property("modName"),
            modVersion: project.version,
            modDescription: project.property("modDescription"),
            minecraftVersion: project.property("supportedMinecraftRange_1_17_1"),
            javaVersion: "16"
        )
    }
}
