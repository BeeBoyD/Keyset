plugins {
    id "architectury-plugin"
    id "dev.architectury.loom"
    id "com.diffplug.spotless"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

base {
    archivesName = "keyset-forge-1.21.1"
}

loom {
    silentMojangMappingsLicense()
    mods {
        main {
            sourceSet sourceSets.main
        }
    }
}

architectury {
    platformSetupLoomIde()
    forge()
}

sourceSets {
    main {
        java {
            srcDir(project(":core").file("src/main/java"))
            srcDir(project(":common-v1_21-to-v1_21_11").file("src/main/java"))
            srcDir(project(":platform-forge-1_20_1").file("src/main/java"))
            srcDir(project(":platform-fabric-1_21_1").file("src/main/java"))
            exclude("net/beeboyd/keyset/platform/fabric/KeysetFabricClient.java")
        }
        resources {
            srcDir(project(":platform-forge-1_20_1").file("src/main/resources"))
            srcDir(project(":platform-fabric-1_21_1").file("src/main/resources"))
            exclude("fabric.mod.json", "pack.mcmeta")
        }
    }
    launcherPatch {
        compileClasspath += main.compileClasspath + main.output
        runtimeClasspath += output + compileClasspath
    }
    eventbusPatch {
        compileClasspath += main.compileClasspath + main.output
        runtimeClasspath += output + compileClasspath
    }
    bootstrapPatch
}

configurations.configureEach {
    exclude(group: "net.fabricmc", module: "fabric-log4j-util")
}

dependencies {
    minecraft "com.mojang:minecraft:${project.property('minecraftVersion_1_21_1')}"
    mappings "net.fabricmc:yarn:${project.property('yarnMappings_1_21_1')}:v2"
    forge "net.minecraftforge:forge:${project.property('forgeVersion_1_21_1')}"
    bootstrapPatchImplementation "net.minecraftforge:bootstrap-api:2.1.8"
}

def bootstrapPatchJar = tasks.register("bootstrapPatchJar", Jar) {
    archiveClassifier = "bootstrap-patch"
    from(sourceSets.bootstrapPatch.output)
}

tasks.withType(JavaCompile).configureEach {
    options.release = 21
}

tasks.withType(JavaExec).configureEach {
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

def forgeDevFmlConfig = layout.projectDirectory.file("run/config/fml.toml")

tasks.register("prepareForgeDevFmlConfig") {
    outputs.file(forgeDevFmlConfig)

    doLast {
        def configFile = forgeDevFmlConfig.asFile
        configFile.parentFile.mkdirs()
        configFile.text = """# Disable Forge's early window for this 1.21.1 dev leaf to avoid the current fmlearlydisplay crash on macOS.
versionCheck = true
defaultConfigPath = "defaultconfigs"
disableOptimizedDFU = true
maxThreads = -1
earlyWindowControl = false
earlyWindowProvider = "dummyprovider"
earlyWindowWidth = 854
earlyWindowHeight = 480
earlyWindowFBScale = 1
earlyWindowMaximized = false
earlyWindowSkipGLVersions = []
earlyWindowLogHelpMessage = false
earlyWindowSquir = false
earlyWindowShowCPU = false
"""
    }
}

tasks.named("runClient") {
    dependsOn(tasks.named("prepareForgeDevFmlConfig"))
    dependsOn(tasks.named("compileLauncherPatchJava"))
    dependsOn(tasks.named("compileEventbusPatchJava"))
    dependsOn(bootstrapPatchJar)
    systemProperty("keyset.fmlloaderPatchPath", sourceSets.launcherPatch.output.classesDirs.singleFile.absolutePath)
    systemProperty("keyset.eventbusPatchPath", sourceSets.eventbusPatch.output.classesDirs.singleFile.absolutePath)
    classpath += files(bootstrapPatchJar.flatMap { it.archiveFile })
}

processResources {
    from("src/main/resources") {
        include("pack.mcmeta")
    }
    def expandProps = [
        modId          : project.property("modId"),
        modName        : project.property("modName"),
        modVersion     : project.version,
        modDescription : project.property("modDescription"),
        minecraftVersion: project.property("supportedMinecraftRange_1_21_1"),
        loaderVersion  : "[52,)"
    ]
    inputs.properties(expandProps)
    filesMatching("META-INF/mods.toml") {
        expand(expandProps)
    }
}

jar {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}
