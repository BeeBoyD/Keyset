plugins {
    id "architectury-plugin"
    id "dev.architectury.loom"
    id "com.diffplug.spotless"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

base {
    archivesName = "keyset-forge-1.21.1"
}

loom {
    silentMojangMappingsLicense()
    mods {
        main {
            sourceSet sourceSets.main
        }
    }
}

architectury {
    platformSetupLoomIde()
    forge()
}

sourceSets {
    main {
        java {
            srcDir(project(":core").file("src/main/java"))
            srcDir(project(":common-v1_21-to-v1_21_11").file("src/main/java"))
            srcDir(project(":platform-forge-1_20_1").file("src/main/java"))
            srcDir(project(":platform-fabric-1_21_1").file("src/main/java"))
            exclude("net/beeboyd/keyset/platform/fabric/KeysetFabricClient.java")
        }
        resources {
            srcDir(project(":platform-forge-1_20_1").file("src/main/resources"))
            srcDir(project(":platform-fabric-1_21_1").file("src/main/resources"))
            exclude("fabric.mod.json", "pack.mcmeta")
        }
    }
}

configurations.configureEach {
    exclude(group: "net.fabricmc", module: "fabric-log4j-util")
}

dependencies {
    minecraft "com.mojang:minecraft:${project.property('minecraftVersion_1_21_1')}"
    mappings "net.fabricmc:yarn:${project.property('yarnMappings_1_21_1')}:v2"
    forge "net.minecraftforge:forge:${project.property('forgeVersion_1_21_1')}"
}

tasks.withType(JavaCompile).configureEach {
    options.release = 21
}

tasks.withType(JavaExec).configureEach {
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

processResources {
    from("src/main/resources") {
        include("pack.mcmeta")
    }
    def expandProps = [
        modId          : project.property("modId"),
        modName        : project.property("modName"),
        modVersion     : project.version,
        modDescription : project.property("modDescription"),
        minecraftVersion: project.property("supportedMinecraftRange_1_21_1"),
        loaderVersion  : "[52,)"
    ]
    inputs.properties(expandProps)
    filesMatching("META-INF/mods.toml") {
        expand(expandProps)
    }
}

jar {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}
