name: CI

on:
  push:
    branches: [main, main-next, main-legacy, develop]
    paths:
      - 'modules/**'
      - 'platforms/**'
      - '*.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, main-next, main-legacy, develop]
    paths:
      - 'modules/**'
      - 'platforms/**'
      - '*.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-workspace:
    name: Verify Workspace
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: on-success

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Format check and unit tests
        run: ./gradlew -PworkspaceProfile=ci verifyCiWorkspace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            modules/**/build/reports/tests/
          if-no-files-found: ignore

  build-and-publish:
    name: Build and Publish Beta
    runs-on: ubuntu-latest
    needs: verify-workspace
    # Skip for pull requests — secrets are not available and we never publish from PRs
    if: github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Parse build targets from commit message
        id: targets
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if printf '%s' "$MSG" | grep -qE '\bbuild:all\b'; then
            echo "targets=all" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            TARGETS=$(printf '%s' "$MSG" | grep -oE '\bbuild:[a-z0-9][a-z0-9.-]*' | sed 's/^build://' | paste -sd ',' -)
            if [ -n "$TARGETS" ]; then
              echo "targets=$TARGETS" >> "$GITHUB_OUTPUT"
              echo "should_build=true" >> "$GITHUB_OUTPUT"
            else
              echo "targets=" >> "$GITHUB_OUTPUT"
              echo "should_build=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Set up JDK 25
        if: steps.targets.outputs.should_build == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        if: steps.targets.outputs.should_build == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        if: steps.targets.outputs.should_build == 'true'
        uses: gradle/actions/wrapper-validation@v4

      - name: Build selected targets
        if: steps.targets.outputs.should_build == 'true'
        run: ./gradlew buildSelectedTargets -PbuildTargets=${{ steps.targets.outputs.targets }}

      - name: Publish to Modrinth (beta)
        if: steps.targets.outputs.should_build == 'true'
        run: ./gradlew publishToModrinth -PbuildTargets=${{ steps.targets.outputs.targets }} -PreleaseType=beta
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}

      - name: Create or update GitHub pre-release
        if: steps.targets.outputs.should_build == 'true'
        run: ./gradlew publishToGitHub -PbuildTargets=${{ steps.targets.outputs.targets }} -PreleaseType=beta
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload built jars
        if: steps.targets.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: builtJars-${{ github.run_number }}
          path: builtJars/
          if-no-files-found: error
          retention-days: 14
