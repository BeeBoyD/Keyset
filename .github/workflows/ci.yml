name: CI

on:
  push:
    branches: [main, main-next, main-legacy, develop]
  pull_request:
    branches: [main, main-next, main-legacy, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-workspace:
    name: Verify Workspace
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Format check and unit tests
        run: ./gradlew verifyWorkspace

      - name: Build representative target
        run: ./gradlew buildRepresentativeTarget

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: modules/**/build/reports/tests/
          if-no-files-found: ignore

  build-release-jars:
    name: Build Release Jars
    runs-on: ubuntu-latest
    needs: verify-workspace

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build and verify release bundle
        run: ./gradlew buildTargetJars verifyReleaseBundle

      - name: Upload built jars
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: builtJars
          path: builtJars/
          if-no-files-found: error
          retention-days: 30
