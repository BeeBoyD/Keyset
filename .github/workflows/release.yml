name: Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: Release type
        required: true
        type: choice
        options: [stable, beta, alpha]
        default: stable
      dry-run:
        description: Dry run (generate outputs without publishing)
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build all release jars
        run: ./gradlew buildTargetJars verifyReleaseBundle

      - name: Publish to Modrinth and GitHub
        run: ./gradlew publishMods -PreleaseType=${{ inputs.release-type }} -PpublishDryRun=${{ inputs.dry-run }}
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keyset-release-${{ github.run_number }}
          path: builtJars/
          if-no-files-found: error
          retention-days: 30
