name: Full Workspace Verification

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-workspace-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-full-workspace:
    name: Verify Full Workspace
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Verify full workspace including legacy targets
        run: ./gradlew -PincludeLegacyTargets=true verifyWorkspace

      - name: Upload full-workspace test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-workspace-test-results
          path: |
            modules/**/build/reports/tests/
            platforms/**/build/reports/tests/
          if-no-files-found: ignore
